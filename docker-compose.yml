services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wwd-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX=${PINECONE_INDEX:-what-was-drawn}
      - PINECONE_ENV=${PINECONE_ENV:-us-east-1}
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000,http://frontend:80
    volumes:
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wwd-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./frontend
          ignore: node_modules

  frontend-dev:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"

volumes:
  {}
